replanning:
  triggers: |
    - Stakeholder answers are insufficient to define critical requirements.
    - Constraints conflict in ways that break architecture or scope feasibility.
    - Key integration or compliance context is missing after discovery attempts.
    - Traceability matrix reveals major orphaned requirements.
  guidance: |
    If critical requirements are unresolved, run a focused follow-up interview
    and update assumptions/open questions before proceeding. If constraints
    conflict, branch options and document tradeoffs explicitly before
    final synthesis.
